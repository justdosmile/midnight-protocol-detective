  <g><ellipse cx="420" cy="126" rx="190" ry="120" fill="url(#lamp)"/><ellipse cx="795" cy="126" rx="190" ry="120" fill="url(#lamp)"/><path d="M349 126h142M724 126h142" stroke="#efffff" stroke-width="17" stroke-linecap="round"/><g font-family="Arial, Helvetica, sans-serif"><rect x="530" y="151" width="156" height="34" rx="7" fill="#071017" stroke="#6ee7f2"/><text x="608" y="174" text-anchor="middle" fill="#d8fbff" font-size="15" letter-spacing="2">ОБЫЧНЫЙ СВЕТ</text></g></g>
